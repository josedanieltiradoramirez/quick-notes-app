{% extends "base.html" %}

{% block title %}Folder — Quick Notes{% endblock %}

{% block content %}
  <div class="content-header">
    <div style="display:flex; align-items:center; gap:16px;">
      <a href="/folders" class="back-button" id="back-button">← Back</a>
      <h1 id="folder-title">Loading...</h1>
    </div>
    <button id="button-new-folder">+ New Folder</button>
  </div>

  <div id="new-folder-form" class="form-card hidden">
    <input type="text" id="input-folder-title" placeholder="Folder title">
    <textarea id="input-folder-description" placeholder="Description (optional)" rows="2"></textarea>
    <div class="form-actions">
      <button id="button-save-folder">Save</button>
      <button id="button-cancel-folder">Cancel</button>
    </div>
  </div>

  <div id="sub-folders-container"></div>

  <div class="section-divider">
    <span>Notes</span>
  </div>

  <input type="text" id="search-input" placeholder="Search notes...">

  <button id="button-new-note">+ New Note</button>

  <div id="new-note-form" class="form-card hidden">
    <input type="text" id="input-note-title" placeholder="Title">
    <textarea id="input-note-body" placeholder="Write your note here..." rows="4"></textarea>
    <div class="form-actions">
      <button id="button-save-note">Save</button>
      <button id="button-cancel-note">Cancel</button>
    </div>
  </div>

  <div id="notes-container"></div>
{% endblock %}

{% block scripts %}
  <script>
    const FOLDER_ID = {{ folder_id }}
  </script>
  <script src="/static/folder_detail.js"></script>
{% endblock %}
