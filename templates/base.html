<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Quick Notes{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
  {% block head %}{% endblock %}
</head>
<body>

  <div class="layout">

    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">Quick Notes</div>
        <div class="auth-buttons">
          <a href="/login" id="loginBtn" class="auth-btn" style="display: none;">Sign In</a>
          <button id="logoutBtn" class="auth-btn logout" style="display: none;">Logout</button>
        </div>
      </div>
      <nav>
        <a href="/notebooks" class="nav-item {% if active == 'notebooks' %}active{% endif %}">
          <span>📓</span> Notebooks
        </a>
        <a href="/folders" class="nav-item {% if active == 'folders' %}active{% endif %}">
          <span>📁</span> Folders
        </a>
        <a href="/bibliographies" class="nav-item {% if active == 'bibliographies' %}active{% endif %}">
          <span>📚</span> Bibliographies
        </a>
        <a href="/notes" class="nav-item {% if active == 'notes' %}active{% endif %}">
          <span>📝</span> All Notes
        </a>
      </nav>
    </aside>

    <main class="content">
      {% block content %}{% endblock %}
    </main>

  </div>

  <script src="/static/auth.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
