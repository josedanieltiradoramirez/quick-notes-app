{% extends "base.html" %}

{% block title %}Notebook — Quick Notes{% endblock %}

{% block content %}
  <div class="content-header">
    <div style="display:flex; align-items:center; gap:16px;">
      <a href="/notebooks" class="back-button">← Back</a>
      <h1 id="notebook-title">Loading...</h1>
    </div>
    <button id="button-new-notebook">+ New Notebook</button>
  </div>

  <div id="new-notebook-form" class="form-card hidden">
    <input type="text" id="input-notebook-title" placeholder="Notebook title">
    <textarea id="input-notebook-description" placeholder="Description (optional)" rows="2"></textarea>
    <div class="form-actions">
      <button id="button-save-notebook">Save</button>
      <button id="button-cancel-notebook">Cancel</button>
    </div>
  </div>

  <div id="sub-notebooks-container"></div>

  <div class="section-divider">
    <span>Notes</span>
  </div>

  <input type="text" id="search-input" placeholder="Search notes...">

  <button id="button-new-note">+ New Note</button>

  <div id="new-note-form" class="form-card hidden">
    <input type="text" id="input-note-title" placeholder="Title">
    <textarea id="input-note-body" placeholder="Write your note here..." rows="4"></textarea>
    <div class="form-actions">
      <button id="button-save-note">Save</button>
      <button id="button-cancel-note">Cancel</button>
    </div>
  </div>

  <div id="notes-container"></div>
{% endblock %}

{% block scripts %}
  <script>
    const NOTEBOOK_ID = {{ notebook_id }}
  </script>
  <script src="/static/notebook_detail.js"></script>
{% endblock %}
