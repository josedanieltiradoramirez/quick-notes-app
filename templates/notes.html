{% extends "base.html" %}

{% block title %}Notes — Quick Notes{% endblock %}

{% block content %}
  <div class="content-header">
    <h1>All Notes</h1>
    <button id="button-new-note">+ New Note</button>
  </div>

  <input type="text" id="search-input" placeholder="Search notes...">

  <!-- Modal -->
<div id="note-modal" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header">
      <h2>New Note</h2>
      <button id="button-close-modal" class="modal-close">×</button>
    </div>
    <div class="modal-body">
      <input type="text" id="input-note-title" placeholder="Title">
      <textarea id="input-note-body" placeholder="Write your note here..." rows="5"></textarea>

      <div class="tag-field">
        <label>Notebooks</label>
        <div class="tag-input-container" id="notebook-tags-container">
          <input type="text" id="input-notebook-search" placeholder="Search notebooks..." autocomplete="off">
        </div>
        <div class="tag-dropdown hidden" id="notebook-dropdown"></div>
      </div>

      <div class="tag-field">
        <label>Folders</label>
        <div class="tag-input-container" id="folder-tags-container">
          <input type="text" id="input-folder-search" placeholder="Search folders..." autocomplete="off">
        </div>
        <div class="tag-dropdown hidden" id="folder-dropdown"></div>
      </div>

      <div class="tag-field">
        <label>Bibliographies</label>
        <div class="tag-input-container" id="bibliography-tags-container">
          <input type="text" id="input-bibliography-search" placeholder="Search bibliographies..." autocomplete="off">
        </div>
        <div class="tag-dropdown hidden" id="bibliography-dropdown"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button id="button-cancel-note">Cancel</button>
      <button id="button-save-note">Save</button>
    </div>
  </div>
</div>

<!-- Modal de edición -->
<div id="edit-note-modal" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header">
      <h2>Edit Note</h2>
      <button id="button-close-edit-modal" class="modal-close">×</button>
    </div>
    <div class="modal-body">
      <input type="text" id="input-edit-note-title" placeholder="Title">
      <textarea id="input-edit-note-body" placeholder="Write your note here..." rows="8"></textarea>
    </div>
    <div class="modal-footer">
      <button id="button-cancel-edit-note">Cancel</button>
      <button id="button-save-edit-note">Save</button>
    </div>
  </div>
</div>

  <div class="section-divider"><span>Notes</span></div>

<div class="filter-bar">
  <div class="tag-field">
    <div class="tag-input-container" id="filter-notebook-tags-container">
      <input type="text" id="input-filter-notebook-search" placeholder="Filter by notebook..." autocomplete="off">
    </div>
    <div class="tag-dropdown hidden" id="filter-notebook-dropdown"></div>
  </div>

  <div class="tag-field">
    <div class="tag-input-container" id="filter-folder-tags-container">
      <input type="text" id="input-filter-folder-search" placeholder="Filter by folder..." autocomplete="off">
    </div>
    <div class="tag-dropdown hidden" id="filter-folder-dropdown"></div>
  </div>

  <div class="tag-field">
    <div class="tag-input-container" id="filter-bibliography-tags-container">
      <input type="text" id="input-filter-bibliography-search" placeholder="Filter by bibliography..." autocomplete="off">
    </div>
    <div class="tag-dropdown hidden" id="filter-bibliography-dropdown"></div>
  </div>
</div>


<div id="new-note-form" class="form-card hidden">
  ...
</div>

<div id="notes-container"></div>
  <div id="notes-container"></div>
{% endblock %}

{% block scripts %}
  <script src="/static/notes.js"></script>
{% endblock %}
