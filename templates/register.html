<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Quick Notes</title>
    <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}">
</head>
<body class="auth-page">
    <div class="auth-container">
        <h1>Create Account</h1>
        <div class="error" id="error"></div>
        <div class="success" id="success"></div>
        <form id="registerForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="first_name">First Name</label>
                <input type="text" id="first_name" name="first_name">
            </div>
            <div class="form-group">
                <label for="last_name">Last Name</label>
                <input type="text" id="last_name" name="last_name">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" required>
            </div>
            <button type="submit" class="btn">Create Account</button>
        </form>
        <div class="auth-link">
            Already have an account? <a href="/login">Sign in here</a>
        </div>
    </div>

    <script>
        function isValidEmail(email) {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(email);
        }

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const username = document.getElementById('username').value.trim();
            const first_name = document.getElementById('first_name').value.trim();
            const last_name = document.getElementById('last_name').value.trim();
            const password = document.getElementById('password').value;
            const confirm_password = document.getElementById('confirm_password').value;

            const errorDiv = document.getElementById('error');
            const successDiv = document.getElementById('success');

            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';

            if (!email) {
                errorDiv.textContent = 'Email is required.';
                errorDiv.style.display = 'block';
                return;
            }

            if (!isValidEmail(email)) {
                errorDiv.textContent = 'Please enter a valid email address.';
                errorDiv.style.display = 'block';
                return;
            }

            if (!username) {
                errorDiv.textContent = 'Username is required.';
                errorDiv.style.display = 'block';
                return;
            }

            if (!password) {
                errorDiv.textContent = 'Password is required.';
                errorDiv.style.display = 'block';
                return;
            }

            if (password.length < 6) {
                errorDiv.textContent = 'Password must be at least 6 characters long.';
                errorDiv.style.display = 'block';
                return;
            }

            if (password !== confirm_password) {
                errorDiv.textContent = 'Passwords do not match';
                errorDiv.style.display = 'block';
                return;
            }

            try {
                const response = await fetch('/api/auth/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, username, first_name, last_name, password })
                });

                if (!response.ok) {
                    const data = await response.json();
                    let message = 'Error creating account';
                    if (data.detail) {
                        if (Array.isArray(data.detail)) {
                            message = data.detail.map(errorItem => errorItem.msg || errorItem.message || errorItem.detail).join(', ');
                        } else {
                            message = data.detail;
                        }
                    }
                    throw new Error(message);
                }

                successDiv.textContent = 'Account created successfully. Redirecting to login...';
                successDiv.style.display = 'block';

                setTimeout(() => { window.location.href = '/login'; }, 2000);
            } catch (error) {
                errorDiv.textContent = error.message;
                errorDiv.style.display = 'block';
                console.error('Register error:', error);
            }
        });
    </script>
</body>
</html>
